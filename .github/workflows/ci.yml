name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/conftest.py tests/test_client.py tests/test_health.py tests/test_sheets.py
      - run: uv run mypy src/dingding_service/ --ignore-missing-imports
      - run: uv run pytest tests/ -v
